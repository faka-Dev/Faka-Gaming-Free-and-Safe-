<!DOCTYPE html>
<html>
<head>
  <title>GameZone Pro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    .navbar {
      background: black;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    .hero {
      text-align: center;
      padding: 40px;
      background: linear-gradient(to right, black, purple);
    }

    .games {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 15px;
      margin: 15px;
      width: 220px;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px red;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card button {
      margin-top: 10px;
      padding: 10px;
      background: red;
      border: none;
      color: white;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      padding: 15px;
      background: black;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
    }

    .modal-content {
      background: #1c1c1c;
      margin: 10% auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      text-align: center;
    }

    .close {
      float: right;
      cursor: pointer;
      color: red;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <h2>🎮 GameZone Pro</h2>
    <input type="text" placeholder="Search games..." onkeyup="searchGames(this.value)">
  </div>

  <!-- Hero -->
  <div class="hero">
    <h1>🔥 Explore Games</h1>
    <p>Download & Play Amazing Games</p>
  </div>

  <!-- Games -->
  <div class="games" id="gameList">

    <div class="card" onclick="openModal('Car Racing')">
      <img src="https://via.placeholder.com/200">
      <h3>Car Racing</h3>
      <button>View</button>
    </div>

    <div class="card" onclick="openModal('Shooter Game')">
      <img src="https://via.placeholder.com/200">
      <h3>Shooter Game</h3>
      <button>View</button>
    </div>

    <div class="card" onclick="openModal('Island Adventure')">
      <img src="https://via.placeholder.com/200">
      <h3>Island Adventure</h3>
      <button>View</button>
    </div>

  </div>

  <!-- Modal -->
  <div class="modal" id="gameModal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">X</span>
      <h2 id="gameTitle"></h2>
      <p>Awesome game with exciting gameplay!</p>
      <button onclick="download()">Download</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>© 2026 GameZone Pro</p>
  </div>

  <script>
    function download() {
      alert("Game download coming soon 🚀");
    }

    function openModal(gameName) {
      document.getElementById("gameModal").style.display = "block";
      document.getElementById("gameTitle").innerText = gameName;
    }

    function closeModal() {
      document.getElementById("gameModal").style.display = "none";
    }

    function searchGames(input) {
      let cards = document.querySelectorAll(".card");
      input = input.toLowerCase();

      cards.forEach(card => {
        let title = card.innerText.toLowerCase();
        card.style.display = title.includes(input) ? "block" : "none";
      });
    }
  </script>

</body>
</html>
